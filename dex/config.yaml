issuer: https://asuite.gridtabs.com/dex

storage:
  type: sqlite3
  config:
    file: /var/dex/dex.db

web:
  http: 0.0.0.0:5556

oauth2:
  skipApprovalScreen: true
  responseTypes:
    - code

staticClients:
  - id: asuite-shell
    redirectURIs:
      - "https://asuite.gridtabs.com/api/auth/callback/dex"
      - "http://localhost:3100/api/auth/callback/dex"
      - "http://localhost:3101/api/auth/callback/dex"
    name: ASuite Shell
    secret: shell-secret-change-me

  - id: outline
    redirectURIs:
      - "https://outline.gridtabs.com/auth/oidc.callback"
      - "http://localhost:3000/auth/oidc.callback"
    name: Outline
    secret: outline-secret-change-me

  - id: mattermost
    redirectURIs:
      - "https://mm.gridtabs.com/signup/gitlab/complete"
      - "http://localhost:8065/signup/gitlab/complete"
    name: Mattermost
    secret: mattermost-secret-change-me

  - id: nocodb
    redirectURIs:
      - "https://noco.gridtabs.com/api/v1/auth/oidc/callback"
      - "http://localhost:8080/api/v1/auth/oidc/callback"
    name: NocoDB
    secret: nocodb-secret-change-me

enablePasswordDB: true

staticPasswords:
  - email: "admin@asuite.local"
    hash: "$2a$10$xFAV6/St8ZwFyeHVQawatOVY7K5EDFjh45krE8/OhwN6dzLbUS5z."
    username: "Admin"
    userID: "admin-001"
